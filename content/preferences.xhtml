<vbox xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul" 
      xmlns:html="http://www.w3.org/1999/xhtml"
      flex="1" style="padding: 6px;" onload="Zotero.FolderImport.onPrefsLoad(event)">
  <caption label="PDF Watch Settings" />
  
  <hbox align="center">
    <label value="Watch Folder:" />
    <html:input id="watch-folder" type="text" flex="1" style="min-width: 200px;" />
    <button id="browse-btn" label="Browse..." />
  </hbox>
  
  <hbox align="center">
    <label value="Scan Interval (seconds):" />
    <html:input id="scan-interval" type="number" min="1" max="3600" style="width: 80px;" />
  </hbox>
  
  <separator />
  
  <checkbox id="watch-enabled" label="Auto-start PDF Watch on Zotero launch" />
  
  <separator />
  
  <description id="status-label" value="Status: Loading..." />
</vbox>
